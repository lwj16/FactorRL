experiment_name: toy_qfr
seed: 7
device: cpu

data:
  kind: toy
  n_dates: 260
  n_assets: 32
  lookback: 20
  forecast_horizon: 5
  train_ratio: 0.7
  valid_ratio: 0.15

tokens:
  features: [open, high, low, close, volume, vwap]
  constants: [-1.0, -0.01, 0.01, 1.0, 5.0]
  windows: [5, 10, 20]
  max_length: 8

model:
  embedding_dim: 64
  hidden_dim: 128
  num_heads: 4

training:
  episodes: 80
  batch_size: 8
  learning_rate: 0.001
  entropy_weight: 0.001
  grad_clip: 1.0
  log_every: 10

reward:
  lambda_penalty: 0.02
  alpha_delay: 10
  eta: 0.005
  delta: 0.15

pool:
  max_factors: 8
  ridge: 0.001
